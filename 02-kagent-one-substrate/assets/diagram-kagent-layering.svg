<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="Segoe UI, Arial, sans-serif">
  <rect width="820" height="440" fill="#ffffff"/>
  <defs>
    <marker id="ki" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#4f46e5"/></marker>
    <marker id="ks" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#64748b"/></marker>
  </defs>
  <text x="410" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">kagent on top of Agent Substrate</text>

  <g text-anchor="middle">
    <!-- user -->
    <rect x="300" y="54" width="220" height="42" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="410" y="80" font-size="13" font-weight="bold" fill="#0f172a">kubectl / kagent UI</text>

    <!-- kagent layer -->
    <rect x="60" y="150" width="700" height="115" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="80" y="175" text-anchor="start" font-size="13" font-weight="bold" fill="#3730a3">kagent · namespace: kagent</text>
    <rect x="85" y="192" width="100" height="52" rx="8" fill="#ffffff" stroke="#4f46e5"/>
    <text x="135" y="223" font-size="13" font-weight="bold" fill="#3730a3">ui</text>
    <rect x="205" y="192" width="150" height="52" rx="8" fill="#ffffff" stroke="#4f46e5"/>
    <text x="280" y="223" font-size="13" font-weight="bold" fill="#3730a3">controller</text>
    <rect x="450" y="192" width="280" height="52" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="590" y="215" font-size="12" font-weight="bold" fill="#6d28d9">ActorTemplate + WorkerPool</text>
    <text x="590" y="232" font-size="11" fill="#7c3aed">*.ate.dev CRDs</text>

    <!-- substrate layer -->
    <rect x="60" y="330" width="700" height="80" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="410" y="362" font-size="14" font-weight="bold" fill="#047857">Agent Substrate · namespace: ate-system</text>
    <text x="410" y="386" font-size="12" fill="#059669">ate-api-server · atenet-router · atelet · valkey · rustfs</text>
  </g>

  <!-- user -> kagent -->
  <path d="M410 96 V150" stroke="#4f46e5" stroke-width="2" marker-end="url(#ki)"/>
  <text x="420" y="124" text-anchor="start" font-size="11" fill="#3730a3">apply SandboxAgent</text>
  <!-- controller -> CRDs -->
  <path d="M355 218 H450" stroke="#64748b" stroke-width="2" marker-end="url(#ks)"/>
  <text x="402" y="210" text-anchor="middle" font-size="11" fill="#64748b">reconciles</text>
  <!-- kagent -> substrate -->
  <path d="M410 265 V330" stroke="#4f46e5" stroke-width="2" marker-end="url(#ki)"/>
  <text x="420" y="285" text-anchor="start" font-size="11" fill="#3730a3">controller.substrate.*</text>
  <text x="420" y="301" text-anchor="start" font-size="11" fill="#475569">ateApiEndpoint → api.ate-system · atenetRouterURL → atenet-router</text>
</svg>
