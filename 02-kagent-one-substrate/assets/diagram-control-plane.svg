<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <defs>
    <marker id="ci" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#4f46e5"/></marker>
    <marker id="cs" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#64748b"/></marker>
  </defs>
  <text x="450" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Agent Substrate control plane</text>

  <!-- namespace frame -->
  <rect x="30" y="52" width="840" height="350" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="6 4"/>
  <text x="50" y="76" font-size="13" font-weight="bold" fill="#64748b">namespace: ate-system</text>

  <g text-anchor="middle">
    <!-- request -->
    <text x="95" y="135" font-size="13" font-weight="bold" fill="#0f172a">request</text>
    <!-- atenet-router -->
    <rect x="170" y="108" width="190" height="58" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="265" y="132" font-size="13" font-weight="bold" fill="#3730a3">atenet-router</text>
    <text x="265" y="150" font-size="11" fill="#475569">L7 request routing</text>
    <!-- worker -->
    <rect x="560" y="108" width="200" height="58" rx="10" fill="#ffffff" stroke="#4f46e5"/>
    <text x="660" y="132" font-size="13" font-weight="bold" fill="#3730a3">Worker pod</text>
    <text x="660" y="150" font-size="11" fill="#475569">hosts one actor</text>

    <!-- api-server -->
    <rect x="150" y="230" width="230" height="64" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="265" y="256" font-size="13" font-weight="bold" fill="#3730a3">ate-api-server</text>
    <text x="265" y="276" font-size="11" fill="#475569">schedule · suspend · resume</text>
    <!-- atelet -->
    <rect x="560" y="230" width="200" height="64" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="660" y="256" font-size="13" font-weight="bold" fill="#0f172a">atelet</text>
    <text x="660" y="276" font-size="11" fill="#475569">DaemonSet · per node</text>

    <!-- valkey -->
    <rect x="120" y="332" width="220" height="50" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="230" y="354" font-size="12" font-weight="bold" fill="#0f172a">valkey-cluster</text>
    <text x="230" y="371" font-size="11" fill="#475569">actor / worker state, locks</text>
    <!-- rustfs -->
    <rect x="360" y="332" width="220" height="50" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="470" y="354" font-size="12" font-weight="bold" fill="#b45309">rustfs</text>
    <text x="470" y="371" font-size="11" fill="#92400e">S3 snapshot storage</text>
  </g>

  <!-- arrows -->
  <path d="M130 130 H170" stroke="#4f46e5" stroke-width="2" marker-end="url(#ci)"/>
  <path d="M360 137 H560" stroke="#4f46e5" stroke-width="2" marker-end="url(#ci)"/>
  <!-- router <-> api-server -->
  <path d="M265 166 V230" stroke="#64748b" stroke-width="2" marker-end="url(#cs)"/>
  <text x="278" y="202" font-size="11" fill="#64748b">which worker?</text>
  <!-- api-server -> atelet -->
  <path d="M380 262 H560" stroke="#64748b" stroke-width="2" marker-end="url(#cs)"/>
  <!-- atelet -> worker (restore/checkpoint) -->
  <path d="M660 230 V166" stroke="#64748b" stroke-width="2" marker-end="url(#cs)"/>
  <text x="672" y="202" font-size="11" fill="#64748b">restore / checkpoint</text>
  <!-- api-server -> valkey & rustfs -->
  <path d="M250 294 V332" stroke="#64748b" stroke-width="2" marker-end="url(#cs)"/>
  <path d="M300 294 C330 312, 400 318, 450 332" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#cs)"/>
</svg>
