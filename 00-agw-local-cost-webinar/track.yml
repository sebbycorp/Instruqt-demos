title: 'AgentGateway Local: Stand Up an AI Cost Control Plane in Docker'
teaser: Run Agentgateway OSS in Docker, front OpenAI and an MCP server through it,
  and make every dollar of LLM and tool spend visible and governable — all on one
  box.
description: |
  Most teams discover their AI bill after the fact. This hands-on webinar puts a
  single cost-aware chokepoint in front of all your LLM and MCP traffic — running
  entirely in Docker on one machine, no Kubernetes required.

  You will:
  - Stand up **Agentgateway OSS in a Docker container**, fronting OpenAI on `:4000`
    and a Model Context Protocol (MCP) tool server on `:3000`, with a built-in cost
    catalog and request log.
  - See the **exact cost of every request** as it lands in the gateway's SQLite log
    and the web UI.
  - **Govern spend** with token budgets and model pinning.
  - Route traffic by cost — cheap model by default, premium only on demand.
  - Prove that **MCP traffic is spend too**, then answer the question every CFO asks:
    "what did this cost?"

  By the end you have a local, reproducible AI cost control plane you can demo to your
  own team in minutes.
