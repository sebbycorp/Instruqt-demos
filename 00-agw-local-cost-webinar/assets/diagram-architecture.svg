<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <style>
      .lbl{fill:#475569;font-size:12px}
      .port{fill:#0f766e;font-size:12px;font-weight:600}
      .title{font-size:14px;font-weight:700}
      .sub{font-size:11px;fill:#64748b}
      .edge{stroke:#94a3b8;stroke-width:1.6;fill:none}
    </style>
  </defs>

  <rect width="900" height="470" fill="#f8fafc"/>
  <text x="28" y="38" font-size="19" font-weight="700" fill="#0f172a">AgentGateway Local — one VM, all Docker</text>
  <text x="28" y="58" class="sub">A single cost-aware chokepoint in front of OpenAI and an MCP tool server.</text>

  <!-- Client -->
  <rect x="28" y="150" width="150" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="103" y="200" text-anchor="middle" class="title" fill="#0f172a">Your apps</text>
  <text x="103" y="222" text-anchor="middle" class="sub">curl / SDK / agents</text>
  <text x="103" y="240" text-anchor="middle" class="sub">OpenAI &amp; MCP clients</text>

  <!-- Docker network box -->
  <rect x="225" y="92" width="450" height="330" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-dasharray="5 4"/>
  <text x="245" y="116" font-size="12" font-weight="700" fill="#4f46e5">docker network: agw-net</text>

  <!-- agentgateway container -->
  <rect x="250" y="135" width="245" height="255" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="372" y="162" text-anchor="middle" class="title" fill="#0369a1">agentgateway</text>
  <text x="372" y="180" text-anchor="middle" class="sub">cr.agentgateway.dev/agentgateway:v1.3.1</text>

  <rect x="270" y="198" width="205" height="40" rx="8" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="284" y="216" class="port">:4000</text><text x="332" y="216" class="lbl">OpenAI-compatible LLM API</text>
  <text x="284" y="231" class="sub" >gpt-4.1 (premium) / gpt-4.1-nano</text>

  <rect x="270" y="246" width="205" height="40" rx="8" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="284" y="264" class="port">:3000</text><text x="332" y="264" class="lbl">MCP endpoint</text>
  <text x="284" y="279" class="sub">proxies the tool server</text>

  <rect x="270" y="294" width="205" height="40" rx="8" fill="#fef9c3" stroke="#fde68a"/>
  <text x="284" y="312" class="port" fill="#a16207">:15000</text><text x="346" y="312" class="lbl">Admin UI + cost dashboard</text>
  <text x="284" y="327" class="sub">cost catalog + SQLite request log</text>

  <text x="372" y="360" text-anchor="middle" class="sub">/costs/base-costs.json · /data/data.db</text>

  <!-- mcp-everything container -->
  <rect x="515" y="200" width="140" height="120" rx="12" fill="#ffffff" stroke="#14b8a6" stroke-width="2"/>
  <text x="585" y="232" text-anchor="middle" class="title" fill="#0f766e">mcp-everything</text>
  <text x="585" y="252" text-anchor="middle" class="sub">node:22-alpine</text>
  <text x="585" y="270" text-anchor="middle" class="sub">server-everything</text>
  <text x="585" y="288" text-anchor="middle" class="sub">streamableHttp :3001</text>
  <text x="585" y="306" text-anchor="middle" class="sub">/mcp</text>

  <!-- OpenAI external -->
  <rect x="722" y="180" width="150" height="90" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="797" y="222" text-anchor="middle" class="title" fill="#0f172a">OpenAI</text>
  <text x="797" y="242" text-anchor="middle" class="sub">api.openai.com</text>
  <text x="797" y="150" text-anchor="middle" class="sub">external</text>

  <!-- edges -->
  <path class="edge" d="M178 210 H250" marker-end="url(#arr)"/>
  <path class="edge" d="M475 218 H722" marker-end="url(#arr)"/>
  <text x="600" y="210" class="sub">LLM calls</text>
  <path class="edge" d="M475 266 H515" marker-end="url(#arr)"/>
  <text x="486" y="258" class="sub">MCP</text>

  <text x="28" y="455" class="sub">Cheap by default · premium on x-priority · token budgets return 429 · every LLM + MCP call priced in one log.</text>
</svg>
