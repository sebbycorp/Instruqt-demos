<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1180" height="300" fill="#ffffff"/>
  <text x="590" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Agentgateway Tokenomics — what you'll build</text>
  <g text-anchor="middle">
    <!-- Row 1 -->
    <rect x="30"  y="80" width="250" height="64" rx="10" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="155" y="108" font-size="14" font-weight="bold" fill="#3730a3">1 · Stand up the gateway</text>
    <text x="155" y="129" font-size="12" fill="#475569">one control point, in Docker</text>
    <rect x="320" y="80" width="250" height="64" rx="10" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="445" y="108" font-size="14" font-weight="bold" fill="#3730a3">2 · Add an LLM</text>
    <text x="445" y="129" font-size="12" fill="#475569">LLM-native proxy + logs</text>
    <rect x="610" y="80" width="250" height="64" rx="10" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="735" y="108" font-size="14" font-weight="bold" fill="#3730a3">3 · Cost of every request</text>
    <text x="735" y="129" font-size="12" fill="#475569">real USD per call</text>
    <rect x="900" y="80" width="250" height="64" rx="10" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="1025" y="108" font-size="14" font-weight="bold" fill="#3730a3">4 · Govern the spend</text>
    <text x="1025" y="129" font-size="12" fill="#475569">token budget · 429</text>
    <!-- Row 2 -->
    <rect x="30"  y="196" width="250" height="64" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="155" y="224" font-size="14" font-weight="bold" fill="#065f46">5 · Cost-aware routing</text>
    <text x="155" y="245" font-size="12" fill="#475569">cheap by default</text>
    <rect x="320" y="196" width="250" height="64" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="445" y="224" font-size="14" font-weight="bold" fill="#065f46">6 · Add MCP tools</text>
    <text x="445" y="245" font-size="12" fill="#475569">one gateway, LLM + tools</text>
    <rect x="610" y="196" width="250" height="64" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="735" y="224" font-size="14" font-weight="bold" fill="#065f46">7 · Analyze the spend</text>
    <text x="735" y="245" font-size="12" fill="#475569">who spent what</text>
    <rect x="900" y="196" width="250" height="64" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="1025" y="224" font-size="14" font-weight="bold" fill="#065f46">8 · Per-team keys</text>
    <text x="1025" y="245" font-size="12" fill="#475569">authenticated + attributable</text>
    <!-- arrows row 1 -->
    <path d="M280 112 H320" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
    <path d="M570 112 H610" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
    <path d="M860 112 H900" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
    <!-- wrap arrow down -->
    <path d="M1025 144 V170 H155 V196" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
    <!-- arrows row 2 -->
    <path d="M280 228 H320" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
    <path d="M570 228 H610" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
    <path d="M860 228 H900" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  </g>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#94a3b8"/></marker></defs>
</svg>
