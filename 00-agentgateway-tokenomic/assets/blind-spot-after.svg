<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ahB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="ahG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="470" fill="#ffffff"/>
  <text x="30" y="44" font-size="26" font-weight="700" fill="#0f172a">The fix: one gateway in front of all AI traffic</text>
  <text x="30" y="72" font-size="15" fill="#64748b">Every call flows through a single place you operate.</text>

  <!-- clients -->
  <g font-size="13" fill="#0f172a">
    <rect x="30" y="120" width="150" height="38" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="105" y="144" text-anchor="middle">Agents</text>
    <rect x="30" y="166" width="150" height="38" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="105" y="190" text-anchor="middle">Cursor</text>
    <rect x="30" y="212" width="150" height="38" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="105" y="236" text-anchor="middle">Claude Code</text>
    <rect x="30" y="258" width="150" height="38" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="105" y="282" text-anchor="middle">SDKs</text>
    <rect x="30" y="304" width="150" height="38" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="105" y="328" text-anchor="middle">Scripts</text>
  </g>

  <!-- arrows into gateway -->
  <g stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ahB)">
    <path d="M182,139 C280,150 300,210 372,225"/>
    <path d="M182,185 C290,195 300,220 372,235"/>
    <path d="M182,231 L372,231"/>
    <path d="M182,277 C290,270 300,250 372,243"/>
    <path d="M182,323 C290,310 300,260 372,250"/>
  </g>

  <!-- gateway -->
  <rect x="375" y="150" width="170" height="170" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="460" y="200" text-anchor="middle" font-size="17" font-weight="800" fill="#1e3a8a">Agentgateway</text>
  <text x="460" y="222" text-anchor="middle" font-size="13" fill="#1d4ed8">:4000  ·  OSS</text>
  <line x1="395" y1="238" x2="525" y2="238" stroke="#93c5fd" stroke-width="1.5"/>
  <g font-size="12.5" fill="#1e3a8a" text-anchor="middle">
    <text x="460" y="262">tokens · USD cost</text>
    <text x="460" y="284">budgets · model policy</text>
    <text x="460" y="306">logs · UI :15000</text>
  </g>

  <!-- providers -->
  <g font-size="13" fill="#0f172a" font-weight="600">
    <rect x="730" y="150" width="160" height="44" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="810" y="178" text-anchor="middle">OpenAI</text>
    <rect x="730" y="208" width="160" height="44" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="810" y="236" text-anchor="middle">Anthropic / Gemini</text>
    <rect x="730" y="266" width="160" height="44" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="810" y="294" text-anchor="middle">MCP tools</text>
  </g>

  <!-- gateway to providers -->
  <g stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#ahG)">
    <path d="M545,205 C640,195 660,180 728,175"/>
    <path d="M545,235 L728,232"/>
    <path d="M545,265 C640,275 660,285 728,290"/>
  </g>

  <text x="460" y="372" text-anchor="middle" font-size="15" fill="#16a34a" font-weight="700">visibility · real cost · attribution · governance — in real time</text>
</svg>
