title: 'Agentgateway in Docker: Govern Your AI Token Spend'
teaser: Run Agentgateway as a Docker container, proxy LLM and MCP traffic through
  one control point, then analyze a week of token spend.
description: "Your AI agents call LLMs and MCP tools directly — no chokepoint, no
  cost\nvisibility, no governance. **Agentgateway** is a single Rust binary you can
  run\nas a Docker container to put one control point in front of all of it.\n\nIn
  this hands-on lab you'll:\n\n- \U0001F433 Run Agentgateway as a Docker container
  and connect to its built-in UI\n- \U0001F310 Add an OpenAI model and turn the gateway
  into an OpenAI-compatible proxy\n- \U0001F50C Deploy a separate MCP server and bring
  tool traffic under the same gateway\n- \U0001F4CA Analyze a week of captured traffic
  — cost by model/provider/user and usage\n\n**No Kubernetes. No prior Agentgateway
  experience.** Just Docker basics and a terminal."
