title: 'AI Cost & Token Spend: Govern LLM and MCP Traffic with Agentgateway'
teaser: Track, troubleshoot, and control AI token spend across your org using standalone
  Agentgateway OSS.
description: "Finance just forwarded a five-figure OpenAI bill and asked \"who spent
  this?\" — and nobody on the platform team can answer. Agents, copilots, and scripts
  are calling LLMs and MCP tools directly, with no shared control point. That's shadow
  AI, and it's the same loss of control enterprises hit with microservices before
  API gateways.\n\nIn this ~15-minute hands-on lab you'll put **standalone Agentgateway
  OSS v1.3.1** in front of all AI traffic and get control back:\n\n- \U0001F9EE Understand
  how tokens are calculated and what LLM features actually cost\n- \U0001F6A6 Route
  OpenAI traffic through a single gateway you operate\n- \U0001F4B5 See realized USD
  cost and token usage on every request\n- \U0001F527 Troubleshoot the gateway with
  the admin API on :15000\n- \U0001F6E1️ Enforce per-team token budgets and an approved-model
  policy\n- \U0001F50C Bring MCP tool traffic under the same control point\n- \U0001F4CA
  Answer \"who spent the money?\" with fleet-scale cost analysis\n\nBuilt for platform,
  FinOps, and SecOps teams evaluating Agentgateway. Familiarity with the terminal
  and JSON is helpful; no Kubernetes required.\n"
