<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ahR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="470" fill="#ffffff"/>
  <text x="30" y="44" font-size="26" font-weight="700" fill="#0f172a">Today: shadow AI</text>
  <text x="30" y="72" font-size="15" fill="#64748b">Everyone calls the models directly. No shared control point.</text>

  <!-- client boxes -->
  <g font-size="14" fill="#0f172a">
    <rect x="30" y="110" width="170" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="115" y="136" text-anchor="middle">Agents</text>
    <rect x="30" y="166" width="170" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="115" y="192" text-anchor="middle">Cursor</text>
    <rect x="30" y="222" width="170" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="115" y="248" text-anchor="middle">Claude Code</text>
    <rect x="30" y="278" width="170" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="115" y="304" text-anchor="middle">SDKs</text>
    <rect x="30" y="334" width="170" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="115" y="360" text-anchor="middle">Scripts &amp; cron jobs</text>
  </g>

  <!-- provider clouds -->
  <g font-size="14" fill="#0f172a" font-weight="600">
    <rect x="690" y="120" width="200" height="50" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="790" y="151" text-anchor="middle">OpenAI</text>
    <rect x="690" y="210" width="200" height="50" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="790" y="241" text-anchor="middle">Anthropic / Gemini</text>
    <rect x="690" y="300" width="200" height="50" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="790" y="331" text-anchor="middle">MCP tools</text>
  </g>

  <!-- tangled arrows -->
  <g stroke="#dc2626" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#ahR)">
    <path d="M205,131 C420,140 470,150 685,145"/>
    <path d="M205,187 C430,170 480,310 685,325"/>
    <path d="M205,243 C440,250 470,150 685,235"/>
    <path d="M205,299 C430,300 470,160 685,150"/>
    <path d="M205,355 C440,360 470,250 685,250"/>
    <path d="M205,300 C420,330 520,330 685,335"/>
  </g>

  <!-- no control point zone -->
  <rect x="300" y="95" width="300" height="300" rx="14" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="7 6" opacity="0.55"/>
  <text x="450" y="424" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="600">no visibility · no attribution · no budget</text>

  <!-- bill badge -->
  <g>
    <rect x="360" y="120" width="180" height="74" rx="12" fill="#dc2626"/>
    <text x="450" y="152" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">$40,000</text>
    <text x="450" y="176" text-anchor="middle" font-size="14" fill="#fee2e2">who spent this?</text>
  </g>
</svg>
