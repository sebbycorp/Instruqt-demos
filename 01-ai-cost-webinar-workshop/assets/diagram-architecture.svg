<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/></marker>
  </defs>
  <rect width="920" height="430" fill="#ffffff"/>
  <text x="30" y="42" font-size="25" font-weight="700" fill="#0f172a">Your standalone gateway</text>
  <text x="30" y="68" font-size="15" fill="#64748b">One Rust binary — the single control point for all AI traffic.</text>

  <!-- clients -->
  <g font-size="13" fill="#0f172a">
    <rect x="30" y="120" width="150" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/><text x="105" y="145" text-anchor="middle">Apps / agents</text>
    <rect x="30" y="172" width="150" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/><text x="105" y="197" text-anchor="middle">Cursor · Claude Code</text>
    <rect x="30" y="224" width="150" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/><text x="105" y="249" text-anchor="middle">curl · SDKs</text>
  </g>
  <g stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#aB)">
    <path d="M182,140 C300,150 320,185 372,192"/>
    <path d="M182,192 L372,205"/>
    <path d="M182,244 C300,235 320,215 372,218"/>
  </g>

  <!-- gateway -->
  <rect x="375" y="120" width="210" height="200" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="480" y="152" text-anchor="middle" font-size="18" font-weight="800" fill="#1e3a8a">Agentgateway</text>
  <line x1="395" y1="166" x2="565" y2="166" stroke="#93c5fd" stroke-width="1.5"/>
  <g font-size="13" fill="#1e3a8a">
    <text x="395" y="190">:4000 — LLM API</text>
    <text x="395" y="212">:3000 — MCP</text>
    <text x="395" y="234">:15000 — admin + UI</text>
    <text x="395" y="256">:15020 — metrics</text>
  </g>
  <g font-size="11.5" fill="#1d4ed8"><text x="480" y="290" text-anchor="middle">cost catalog · SQLite logs</text><text x="480" y="307" text-anchor="middle">policies · budgets · keys</text></g>

  <!-- providers -->
  <g font-size="13" fill="#0f172a" font-weight="600">
    <rect x="740" y="150" width="150" height="44" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/><text x="815" y="178" text-anchor="middle">OpenAI</text>
    <rect x="740" y="232" width="150" height="44" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/><text x="815" y="260" text-anchor="middle">MCP tools</text>
  </g>
  <g stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#aG)">
    <path d="M585,190 C660,180 680,175 738,172"/>
    <path d="M585,250 C660,255 680,255 738,254"/>
  </g>

  <text x="460" y="370" text-anchor="middle" font-size="14.5" fill="#16a34a" font-weight="700">every call metered, priced, logged, and governed — in one place</text>
</svg>
