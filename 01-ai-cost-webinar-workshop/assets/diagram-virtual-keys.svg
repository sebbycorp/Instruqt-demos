<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="kb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="kg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/></marker>
    <marker id="kr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>
  <rect width="920" height="430" fill="#ffffff"/>
  <text x="30" y="42" font-size="25" font-weight="700" fill="#0f172a">Per-team virtual keys</text>
  <text x="30" y="68" font-size="15" fill="#64748b">You issue the keys. The real provider key never leaves the gateway.</text>

  <!-- teams -->
  <g font-size="12.5">
    <rect x="30" y="120" width="200" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/><text x="46" y="147" fill="#0f172a">sales → <tspan font-weight="700">sk-team-sales-…</tspan></text>
    <rect x="30" y="176" width="200" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/><text x="46" y="203" fill="#0f172a">eng → <tspan font-weight="700">sk-team-eng-…</tspan></text>
    <rect x="30" y="248" width="200" height="44" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><text x="46" y="275" fill="#991b1b">no key</text>
  </g>
  <path d="M232,142 C300,150 320,175 372,188" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#kg)"/>
  <path d="M232,198 L372,205" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#kg)"/>
  <path d="M232,270 C300,255 320,230 372,218" stroke="#dc2626" stroke-width="2.2" fill="none" stroke-dasharray="6 5" marker-end="url(#kr)"/>
  <text x="300" y="300" font-size="12" fill="#dc2626" font-weight="700">401 — rejected</text>

  <!-- gateway -->
  <rect x="375" y="150" width="200" height="110" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="475" y="184" text-anchor="middle" font-size="16" font-weight="800" fill="#1e3a8a">Agentgateway</text>
  <text x="475" y="208" text-anchor="middle" font-size="12.5" fill="#1d4ed8">validates virtual key</text>
  <text x="475" y="228" text-anchor="middle" font-size="12.5" fill="#1d4ed8">attaches team + owner</text>
  <text x="475" y="248" text-anchor="middle" font-size="12.5" fill="#1d4ed8">holds the real OpenAI key 🔒</text>

  <!-- openai -->
  <rect x="730" y="178" width="160" height="54" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="810" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">OpenAI</text>
  <path d="M575,205 C650,205 660,205 728,205" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#kb)"/>
  <text x="650" y="195" text-anchor="middle" font-size="11.5" fill="#1d4ed8" font-weight="600">real key (never exposed)</text>

  <text x="460" y="392" text-anchor="middle" font-size="14.5" fill="#0f172a" font-weight="700">revoke a team in one line · every call attributable · provider key stays secret</text>
</svg>
