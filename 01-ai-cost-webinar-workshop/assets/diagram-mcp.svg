<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="mb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="mo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker>
  </defs>
  <rect width="920" height="430" fill="#ffffff"/>
  <text x="30" y="42" font-size="25" font-weight="700" fill="#0f172a">MCP is spend too</text>
  <text x="30" y="68" font-size="15" fill="#64748b">Every tool schema and tool result rides along as tokens.</text>

  <!-- agent -->
  <rect x="30" y="170" width="130" height="60" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="95" y="205" text-anchor="middle" font-size="14" fill="#0f172a">Agent</text>

  <!-- gateway -->
  <rect x="220" y="150" width="180" height="100" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="310" y="184" text-anchor="middle" font-size="16" font-weight="800" fill="#1e3a8a">Agentgateway</text>
  <text x="310" y="208" text-anchor="middle" font-size="12.5" fill="#1d4ed8">:4000 LLM · :3000 MCP</text>
  <text x="310" y="228" text-anchor="middle" font-size="12.5" fill="#1d4ed8">one log · one budget</text>
  <path d="M162,200 L216,200" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#mb)"/>

  <!-- LLM -->
  <rect x="470" y="150" width="150" height="50" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="545" y="180" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">OpenAI (LLM)</text>
  <!-- MCP server -->
  <rect x="470" y="220" width="150" height="50" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="545" y="250" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">MCP tools</text>
  <path d="M400,185 L466,178" stroke="#6366f1" stroke-width="1.8" fill="none"/>
  <path d="M400,225 L466,240" stroke="#ea580c" stroke-width="1.8" fill="none" marker-end="url(#mo)"/>

  <!-- token cost callout -->
  <rect x="180" y="300" width="560" height="86" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="200" y="328" font-size="13.5" font-weight="700" fill="#9a3412">What lands in the model's context (= input tokens):</text>
  <g font-size="13" fill="#7c2d12">
    <text x="200" y="352">• every tool's name + description + JSON schema</text>
    <text x="200" y="372">• every tool result, fed back for the next turn</text>
  </g>
  <text x="700" y="345" text-anchor="end" font-size="13" fill="#9a3412" font-weight="700">more tools = more spend</text>

  <text x="460" y="412" text-anchor="middle" font-size="13.5" fill="#0f172a" font-weight="700">put MCP behind the same gateway — same logs, budgets, and visibility as LLM calls</text>
</svg>
