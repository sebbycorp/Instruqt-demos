<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="cg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/></marker>
    <marker id="cp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9333ea"/></marker>
    <marker id="ci" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/></marker>
  </defs>
  <rect width="920" height="440" fill="#ffffff"/>
  <text x="30" y="40" font-size="25" font-weight="700" fill="#0f172a">Two models, two price points</text>
  <text x="30" y="66" font-size="15" fill="#64748b">The model name picks the tier — and the gateway prices every call automatically.</text>

  <!-- requests -->
  <rect x="24" y="120" width="190" height="64" rx="10" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="119" y="146" text-anchor="middle" font-size="12.5" fill="#6b21a8">client asks for</text>
  <text x="119" y="167" text-anchor="middle" font-size="14" font-weight="700" fill="#6b21a8">openai/gpt-4.1</text>

  <rect x="24" y="256" width="190" height="64" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="119" y="282" text-anchor="middle" font-size="12.5" fill="#166534">client asks for</text>
  <text x="119" y="303" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">openai/gpt-4.1-nano</text>

  <!-- gateway -->
  <rect x="285" y="170" width="190" height="100" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="380" y="202" text-anchor="middle" font-size="15" font-weight="800" fill="#1e3a8a">Agentgateway</text>
  <text x="380" y="226" text-anchor="middle" font-size="12.5" fill="#1d4ed8">match by model name</text>
  <text x="380" y="246" text-anchor="middle" font-size="12.5" fill="#1d4ed8">price + log each call</text>

  <path d="M216,150 C250,160 256,185 283,200" stroke="#9333ea" stroke-width="2.4" fill="none" marker-end="url(#cp)"/>
  <path d="M216,290 C250,280 256,255 283,240" stroke="#16a34a" stroke-width="2.4" fill="none" marker-end="url(#cg)"/>

  <!-- premium model -->
  <rect x="560" y="104" width="220" height="84" rx="10" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="670" y="130" text-anchor="middle" font-size="14.5" font-weight="700" fill="#6b21a8">gpt-4.1  (premium)</text>
  <text x="670" y="151" text-anchor="middle" font-size="12" fill="#6b21a8">list $2.00 in / $8.00 out per 1M tok</text>
  <text x="670" y="173" text-anchor="middle" font-size="13" font-weight="700" fill="#6b21a8">≈ $68.00 / 1M calls</text>
  <path d="M475,196 C515,170 520,150 558,140" stroke="#9333ea" stroke-width="2.5" fill="none" marker-end="url(#cp)"/>
  <text x="505" y="150" text-anchor="middle" font-size="11.5" fill="#9333ea" font-weight="600">openai/gpt-4.1</text>

  <!-- cheap model -->
  <rect x="560" y="252" width="220" height="84" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="670" y="278" text-anchor="middle" font-size="14.5" font-weight="700" fill="#166534">gpt-4.1-nano  (default)</text>
  <text x="670" y="299" text-anchor="middle" font-size="12" fill="#166534">list $0.10 in / $0.40 out per 1M tok</text>
  <text x="670" y="321" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">≈ $3.40 / 1M calls</text>
  <path d="M475,244 C515,270 520,290 558,300" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#cg)"/>
  <text x="505" y="294" text-anchor="middle" font-size="11.5" fill="#16a34a" font-weight="600">openai/* default</text>

  <!-- openai -->
  <rect x="822" y="188" width="74" height="64" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="859" y="224" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">OpenAI</text>
  <path d="M780,146 C802,165 808,185 820,206" stroke="#6366f1" stroke-width="1.8" fill="none" marker-end="url(#ci)"/>
  <path d="M780,294 C802,275 808,255 820,236" stroke="#6366f1" stroke-width="1.8" fill="none" marker-end="url(#ci)"/>

  <text x="460" y="420" text-anchor="middle" font-size="14.5" fill="#0f172a" font-weight="700">Same trivial answer — ~$3.40 vs ~$68 per 1M calls. That ~20× gap is a budget decision, not a detail.</text>
</svg>
